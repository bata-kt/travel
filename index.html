<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Board - Persistent</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 1000px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }

        .reset-box {
            text-align: right;
            margin-bottom: 10px;
        }

        .reset-btn {
            background: rgba(255, 82, 82, 0.8);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        th {
            color: #fff;
            text-transform: uppercase;
            padding: 15px;
            font-size: 0.9em;
            letter-spacing: 1.5px;
        }

        tr td {
            background: rgba(255, 255, 255, 0.95);
            padding: 18px;
            transition: 0.3s;
        }

        tr td:first-child { border-radius: 20px 0 0 20px; text-align: center; color: #0288d1; font-weight: 800; }
        tr td:last-child { border-radius: 0 20px 20px 0; text-align: center; }

        .student-name { font-size: 1.2em; color: #1a237e; font-weight: 600; }

        .score-badge {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 800;
        }

        .dest-text { color: #2e7d32; font-weight: 700; }

        .plane-btn {
            background: linear-gradient(135deg, #0288d1, #01579b);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4em;
            transition: 0.3s;
        }

        .plane-btn:hover:not(:disabled) { transform: scale(1.15) rotate(-15deg); }

        .moving-plane {
            position: absolute;
            left: 0; opacity: 0; font-size: 2.2em; pointer-events: none;
        }

        .fly-animation { animation: flyAway 1s ease-in-out forwards; }

        @keyframes flyAway {
            0% { left: 0%; opacity: 0; }
            20% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>Traveler Board</h1>
    <div class="reset-box">
        <button class="reset-btn" onclick="resetScores()">Reset Board 🔄</button>
    </div>
    <table>
        <thead>
            <tr>
                <th width="60">ID</th>
                <th>Student Name</th>
                <th width="100">Score</th>
                <th>Destination</th>
                <th width="100">Take Off</th>
            </tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>
</div>

<script>
    const studentNames = ["Aizere", "Batamir", "Dias", "Nurghisa", "Ersultan", "Mukhamedali", "Nurkanat", "Akhmet", "Alua", "Chinara", "Arailym", "Beibarys"];
    
    // Браузерден сақталған мәліметтерді алу немесе жаңасын бастау
    let travelData = JSON.parse(localStorage.getItem('travelAppScores')) || studentNames.map(name => ({ name, score: 0 }));

    function getDest(score) {
        if (score === 0) return "Waiting Lounge 🛋️";
        if (score <= 2) return "Around the City 🏙️";
        if (score <= 4) return "Almaty 🍎";
        if (score <= 6) return "Turkey 🇹🇷";
        if (score === 7) return "India 🇮🇳";
        if (score === 8) return "France 🇫🇷";
        if (score === 9) return "United Kingdom 🇬🇧";
        return "USA 🇺🇸";
    }

    function renderTable() {
        const tableBody = document.getElementById('studentBody');
        tableBody.innerHTML = '';
        travelData.forEach((student, i) => {
            const row = document.createElement('tr');
            const isFinished = student.score >= 10;
            row.innerHTML = `
                <td>${i + 1}</td>
                <td class="student-name">${student.name}</td>
                <td><span class="score-badge" id="score-${i}">${student.score}</span></td>
                <td><span class="dest-text" id="dest-${i}">${getDest(student.score)}</span></td>
                <td style="position: relative; overflow: hidden;">
                    <div class="moving-plane" id="plane-${i}">✈️</div>
                    <button class="plane-btn" id="btn-${i}" onclick="takeFlight(${i})" ${isFinished ? 'disabled' : ''}>
                        ${isFinished ? '🏁' : '🛫'}
                    </button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    function takeFlight(id) {
        if (travelData[id].score < 10) {
            travelData[id].score++;
            
            // LocalStorage-қа сақтау
            localStorage.setItem('travelAppScores', JSON.stringify(travelData));

            // Анимация және интерфейсті жаңарту
            document.getElementById(`score-${id}`).innerText = travelData[id].score;
            document.getElementById(`dest-${id}`).innerText = getDest(travelData[id].score);
            
            const plane = document.getElementById(`plane-${id}`);
            plane.classList.remove('fly-animation');
            void plane.offsetWidth; 
            plane.classList.add('fly-animation');

            if (travelData[id].score === 10) {
                const btn = document.getElementById(`btn-${id}`);
                btn.disabled = true;
                btn.innerHTML = "🏁";
            }
        }
    }

    function resetScores() {
        if (confirm("Are you sure you want to reset all scores?")) {
            localStorage.removeItem('travelAppScores');
            location.reload();
        }
    }

    renderTable();
</script>

</body>
</html>
