<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveler Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 1000px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 30px;
            color: #ffffff;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        th {
            color: #fff;
            text-transform: uppercase;
            padding: 15px;
            font-size: 0.9em;
            letter-spacing: 1.5px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
        }

        tr td {
            background: rgba(255, 255, 255, 0.95);
            padding: 18px;
            transition: 0.3s;
        }

        tr td:first-child { border-radius: 20px 0 0 20px; text-align: center; color: #0288d1; font-weight: 800; }
        tr td:last-child { border-radius: 0 20px 20px 0; text-align: center; }

        tr:hover td {
            background: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .student-name {
            font-size: 1.2em;
            color: #1a237e;
            font-weight: 600;
        }

        .score-badge {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            color: white;
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1em;
            box-shadow: 0 4px 10px rgba(245, 124, 0, 0.4);
        }

        .dest-text {
            color: #2e7d32;
            font-weight: 700;
            font-size: 1.1em;
        }

        .plane-btn {
            background: linear-gradient(135deg, #0288d1, #01579b);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.4em;
            box-shadow: 0 6px 12px rgba(1, 87, 155, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .plane-btn:hover:not(:disabled) {
            transform: scale(1.15) rotate(-15deg);
            box-shadow: 0 8px 20px rgba(1, 87, 155, 0.5);
        }

        .plane-btn:disabled {
            background: #b0bec5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .moving-plane {
            position: absolute;
            left: 0;
            opacity: 0;
            font-size: 2.2em;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes flyAway {
            0% { left: 0%; opacity: 0; transform: scale(0.5); }
            20% { opacity: 1; }
            100% { left: 100%; opacity: 0; transform: scale(1.2) rotate(-10deg); }
        }

        .fly-animation {
            animation: flyAway 1s ease-in-out forwards;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <h1>Traveler Board</h1>
    <table>
        <thead>
            <tr>
                <th width="60">ID</th>
                <th>Student Name</th>
                <th width="100">Score</th>
                <th>Destination</th>
                <th width="100">Take Off</th>
            </tr>
        </thead>
        <tbody id="studentBody"></tbody>
    </table>
</div>

<script>
    const students = [
        "Aizere", "Batmir", "Dias", "Nurghisa", 
        "Ersultan", "Mukhamedali", "Nurkanat", "Akhmet", 
        "Alua", "Chinara", "Arailym", "Beibarys"
    ];

    function getDest(score) {
        if (score === 0) return "Waiting Lounge 🛋️";
        if (score >= 1 && score <= 2) return "Around the City 🏙️";
        if (score >= 3 && score <= 4) return "Almaty 🍎";
        if (score >= 5 && score <= 6) return "Turkey 🇹🇷";
        if (score === 7) return "India 🇮🇳";
        if (score === 8) return "France 🇫🇷";
        if (score === 9) return "United Kingdom 🇬🇧";
        if (score === 10) return "USA 🇺🇸";
        return "USA 🇺🇸";
    }

    const tableBody = document.getElementById('studentBody');

    students.forEach((name, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${i + 1}</td>
            <td class="student-name">${name}</td>
            <td><span class="score-badge" id="score-${i}">0</span></td>
            <td><span class="dest-text" id="dest-${i}">Waiting Lounge 🛋️</span></td>
            <td style="position: relative; overflow: hidden;">
                <div class="moving-plane" id="plane-${i}">✈️</div>
                <button class="plane-btn" id="btn-${i}" onclick="takeFlight(${i})">🛫</button>
            </td>
        `;
        tableBody.appendChild(row);
    });

    function takeFlight(id) {
        const scoreElem = document.getElementById(`score-${id}`);
        const btn = document.getElementById(`btn-${id}`);
        let currentScore = parseInt(scoreElem.innerText);

        if (currentScore < 10) {
            currentScore++;
            scoreElem.innerText = currentScore;
            document.getElementById(`dest-${id}`).innerText = getDest(currentScore);

            const plane = document.getElementById(`plane-${id}`);
            plane.classList.remove('fly-animation');
            void plane.offsetWidth; 
            plane.classList.add('fly-animation');

            if (currentScore === 10) {
                btn.disabled = true;
                btn.innerHTML = "🏁";
            }
        }
    }
</script>

</body>
</html>
